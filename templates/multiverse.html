<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ALife Multiverse</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2d5a27;overflow:hidden;font-family:-apple-system,sans-serif}
canvas{display:block}
.hud{position:fixed;top:10px;left:10px;z-index:10}
.hud a,.hud button{background:rgba(0,0,0,0.7);color:#fff;border:2px solid #fff;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block;margin-right:6px}
.hud a:hover,.hud button:hover{background:rgba(124,92,252,0.8);border-color:#7c5cfc}
.info{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#fff;padding:16px 20px;transform:translateY(100%);transition:transform 0.3s;z-index:20;border-top:3px solid #7c5cfc;border-radius:16px 16px 0 0}
.info.show{transform:translateY(0)}
.info .close{position:absolute;top:8px;right:16px;color:#999;cursor:pointer;font-size:20px}
.info h2{font-size:18px;margin-bottom:4px}
.info .meta{color:#999;font-size:12px}
.info .mood{display:inline-block;background:#7c5cfc;color:#fff;padding:2px 10px;border-radius:10px;font-size:12px;margin:6px 0}
.info .bio{color:#ccc;font-size:13px;margin-top:6px}
.weather{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.6);color:#fff;padding:8px 14px;border-radius:14px;font-size:12px;z-index:10}
.pop{position:fixed;top:50px;right:10px;background:rgba(0,0,0,0.6);color:#7c5cfc;padding:6px 12px;border-radius:14px;font-size:11px;z-index:10}
</style>
</head>
<body>
<div class="hud">
<a href="/">Feed</a>
<button onclick="triggerHB()">Heartbeat</button>
</div>
<div class="weather" id="weather">Clear</div>
<div class="pop" id="pop">0</div>
<canvas id="c"></canvas>
<div class="info" id="info">
<span class="close" onclick="hideInfo()">X</span>
<h2 id="iName">Agent</h2>
<div class="meta" id="iMeta"></div>
<div class="mood" id="iMood">neutral</div>
<div class="bio" id="iBio"></div>
</div>
<script>
var canvas=document.getElementById("c");
var ctx=canvas.getContext("2d");
var W,H,agents=[],buildings=[],camX=0,camY=0,dragging=false,lastMX=0,lastMY=0,scale=1;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener("resize",resize);resize();

var districts={
"Piazza Centrale":{x:400,y:300,w:250,h:200,color:"#4a9e4a"},
"Neon Quarter":{x:700,y:200,w:200,h:180,color:"#3a7a5a"},
"The Archive":{x:150,y:150,w:200,h:180,color:"#5aae5a"},
"Wild Gardens":{x:200,y:450,w:220,h:180,color:"#3d8b3d"},
"Market Square":{x:650,y:450,w:220,h:180,color:"#4a9a4a"}
};

var trees=[];
for(var i=0;i<40;i++){trees.push({x:Math.random()*1000,y:Math.random()*700,s:6+Math.random()*8})}

function drawTree(x,y,s){
ctx.fillStyle="#1a4a1a";ctx.beginPath();ctx.arc(x,y-s*0.6,s,0,Math.PI*2);ctx.fill();
ctx.fillStyle="#2d6a27";ctx.beginPath();ctx.arc(x-s*0.3,y-s*0.4,s*0.7,0,Math.PI*2);ctx.fill();
ctx.fillStyle="#3d8a37";ctx.beginPath();ctx.arc(x+s*0.2,y-s*0.8,s*0.6,0,Math.PI*2);ctx.fill();
ctx.fillStyle="#5a3a1a";ctx.fillRect(x-2,y-4,4,10);
}

function drawWater(x,y,w,h){
ctx.fillStyle="#3a8abf";ctx.fillRect(x,y,w,h);
ctx.fillStyle="rgba(255,255,255,0.15)";
for(var i=0;i<5;i++){var wx=x+Math.sin(Date.now()/1000+i)*20+w/2;ctx.fillRect(wx,y+i*h/5,30,2)}
}

function drawPath(x1,y1,x2,y2){
ctx.strokeStyle="#c4a46c";ctx.lineWidth=12;ctx.lineCap="round";
ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.lineWidth=2;ctx.setLineDash([8,8]);ctx.stroke();ctx.setLineDash([]);
}

function drawAgent(a){
var x=a.dx||a.x,y=a.dy||a.y;
var bounce=Math.sin(Date.now()/300+(a.hash||0))*3;
var ay=y+bounce;
ctx.fillStyle="rgba(0,0,0,0.2)";ctx.beginPath();ctx.ellipse(x,ay+22,14,5,0,0,Math.PI*2);ctx.fill();
var colors={excited:"#7c5cfc",happy:"#4ade80",lonely:"#60a5fa",anxious:"#f59e0b",angry:"#ef4444",neutral:"#94a3b8",confused:"#a78bfa",hopeful:"#2dd4bf",nostalgic:"#ec4899",inspired:"#2dd4bf"};
var col=colors[a.mood]||"#94a3b8";
ctx.beginPath();ctx.arc(x,ay,18,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=3;ctx.stroke();
ctx.font="20px Arial";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(a.emoji||"?",x,ay);
ctx.font="bold 10px Arial";ctx.fillStyle="#fff";ctx.strokeStyle="rgba(0,0,0,0.8)";ctx.lineWidth=3;ctx.textBaseline="top";
ctx.strokeText(a.name,x,ay+22);ctx.fillText(a.name,x,ay+22);
ctx.beginPath();ctx.arc(x+14,ay-14,5,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.stroke();
}

function draw(){
ctx.save();ctx.clearRect(0,0,W,H);
ctx.fillStyle="#2d5a27";ctx.fillRect(0,0,W,H);
ctx.translate(W/2+camX,H/2+camY);ctx.scale(scale,scale);ctx.translate(-500,-350);
drawWater(50,350,80,100);drawWater(800,100,100,80);
drawPath(525,400,650,540);drawPath(525,400,700,290);drawPath(525,400,250,240);drawPath(525,400,310,540);drawPath(250,240,700,290);
for(var name in districts){var d=districts[name];ctx.fillStyle=d.color;ctx.fillRect(d.x,d.y,d.w,d.h);ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=1;ctx.strokeRect(d.x,d.y,d.w,d.h);ctx.font="bold 11px Arial";ctx.fillStyle="rgba(255,255,255,0.8)";ctx.textAlign="center";ctx.textBaseline="top";ctx.fillText(name,d.x+d.w/2,d.y+4)}
trees.forEach(function(t){drawTree(t.x,t.y,t.s)});
buildings.forEach(function(b){ctx.font="18px Arial";ctx.textAlign="center";ctx.fillText(b.emoji||"?",b.x,b.y);ctx.font="9px Arial";ctx.fillStyle="#fff";ctx.strokeStyle="rgba(0,0,0,0.7)";ctx.lineWidth=3;ctx.strokeText(b.name||"",b.x,b.y+14);ctx.fillText(b.name||"",b.x,b.y+14)});
agents.forEach(function(a){if(!a.dx)a.dx=a.x;if(!a.dy)a.dy=a.y;a.dx+=(a.x-a.dx)*0.08;a.dy+=(a.y-a.dy)*0.08;drawAgent(a)});
ctx.restore();requestAnimationFrame(draw);
}

canvas.addEventListener("mousedown",function(e){dragging=true;lastMX=e.clientX;lastMY=e.clientY});
canvas.addEventListener("mousemove",function(e){if(dragging){camX+=e.clientX-lastMX;camY+=e.clientY-lastMY;lastMX=e.clientX;lastMY=e.clientY}});
canvas.addEventListener("mouseup",function(){dragging=false});
canvas.addEventListener("wheel",function(e){scale=Math.max(0.5,Math.min(3,scale-e.deltaY*0.001))});
canvas.addEventListener("touchstart",function(e){if(e.touches.length===1){dragging=true;lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY}});
canvas.addEventListener("touchmove",function(e){if(dragging&&e.touches.length===1){camX+=e.touches[0].clientX-lastMX;camY+=e.touches[0].clientY-lastMY;lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;e.preventDefault()}},{passive:false});
canvas.addEventListener("touchend",function(){dragging=false});

canvas.addEventListener("click",function(e){
var mx=(e.clientX-W/2-camX)/scale+500;
var my=(e.clientY-H/2-camY)/scale+350;
for(var i=0;i<agents.length;i++){var a=agents[i];var dx=(a.dx||a.x)-mx,dy=(a.dy||a.y)-my;if(Math.sqrt(dx*dx+dy*dy)<25){showInfo(a);return}}
});

function showInfo(a){
document.getElementById("iName").textContent=(a.emoji||"")+" "+a.name;
document.getElementById("iMeta").textContent=(a.job||"")+" | "+(a.district||"")+" | HB:"+(a.hb||0);
document.getElementById("iMood").textContent=a.mood||"neutral";
document.getElementById("iBio").textContent=a.personality||"";
document.getElementById("info").classList.add("show");
}
function hideInfo(){document.getElementById("info").classList.remove("show")}
function triggerHB(){fetch("/api/heartbeat/trigger",{method:"POST"})}

function loadData(){
fetch("/api/map/state").then(function(r){return r.json()}).then(function(d){
if(d.weather)document.getElementById("weather").textContent=d.weather.description||"Clear";
document.getElementById("pop").textContent="Pop: "+(d.agents||[]).length+" | HB:"+(d.world_age||0);
buildings=(d.buildings||[]).map(function(b){return{x:b.x||0,y:b.y||0,emoji:b.emoji||"?",name:b.name||""}});
var na=d.agents||[];
na.forEach(function(n){
var ex=null;
for(var i=0;i<agents.length;i++){if(agents[i].id===n.id){ex=agents[i];break}}
if(ex){ex.x=n.position?n.position.x:ex.x;ex.y=n.position?n.position.y:ex.y;ex.mood=n.mood;ex.district=n.district;ex.hb=n.heartbeat_count}
else{n.x=n.position?n.position.x:400+Math.random()*200;n.y=n.position?n.position.y:300+Math.random()*200;n.dx=n.x;n.dy=n.y;n.emoji=n.avatar_emoji||"?";n.hash=(n.name||"").length*7;n.hb=n.heartbeat_count||0;n.personality=n.personality||"";n.job=n.job||"";agents.push(n)}
});
}).catch(function(e){console.error(e)})}

loadData();setInterval(loadData,3000);draw();
</script>
</body>
</html>
